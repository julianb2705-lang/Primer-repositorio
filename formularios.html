<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form>
        <h1>Iniciar sesion</h1>
        <div>
            <label for="">Ingrese su mail:</label>
            <input type="email">
        </div>
        <div>
            <label for="email">Ingrese su contraseña:</label>
            <input type="password" id="email">
        </div>
        <p>Por favor, marque todas las emociones que se apliquen a usted:</p>
        <div>
            <label for="enojado">Enojado</label>
            <input type="checkbox" id="enojado">
        </div>
        <div>
            <label for="triste">Triste</label>
            <input type="checkbox" id="triste">
        </div>
        <div>
            <label for="feliz">Feliz</label>
            <input type="checkbox" id="feliz">
        </div>
        <p>¿Qué tan satisfecho quedó con nuestro servicio?</p>
        <div>
             <label for="muy satisfecho">Muy satisfecho</label>
            <input type="radio" id="muy satisfecho">
        </div>
    </form>


</body>
</html>
